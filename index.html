<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Med.shop | المتجر الاحترافي</title>
    <style>
        :root {
            --primary-color: #d4af37; /* اللون الذهبي */
            --bg-dark: #0a0a0a;
            --card-bg: #141414;
            --text-color: #ffffff;
            --btn-color: #2ecc71; /* لون زر طلب الآن الأخضر */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-color);
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 20px 0;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--primary-color);
        }

        .brand-logo {
            width: 65px;
            height: 65px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid var(--primary-color);
        }

        header h1 {
            color: var(--primary-color);
            font-size: 2.2rem;
        }

        .table-container {
            overflow-x: auto;
            background-color: var(--card-bg);
            border-radius: 12px;
            border: 1px solid #222;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: right;
        }

        th, td {
            padding: 18px;
            border-bottom: 1px solid #222;
            vertical-align: middle;
        }

        th {
            background-color: rgba(212, 175, 55, 0.05);
            color: var(--primary-color);
            font-weight: bold;
            font-size: 1.1rem;
        }

        tr:hover {
            background-color: rgba(255, 255, 255, 0.02);
        }

        .product-img {
            width: 65px;
            height: 65px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #333;
        }

        .price {
            color: var(--primary-color);
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* زر طلب الآن الواضح */
        .order-btn {
            display: inline-block;
            background-color: var(--btn-color);
            color: white;
            text-decoration: none;
            padding: 8px 18px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.95rem;
            transition: background 0.2s;
            text-align: center;
            box-shadow: 0 4px 10px rgba(46, 204, 113, 0.2);
        }

        .order-btn:hover {
            background-color: #27ae60;
        }

        footer {
            text-align: center;
            padding: 40px 0;
            margin-top: 40px;
            color: #666;
            font-size: 0.9rem;
            border-top: 1px solid #222;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <!-- اللوغو ديالك -->
            <img src="image.png" alt="Med.shop" class="brand-logo">
            <h1>Med.shop</h1>
        </header>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>صورة المنتج</th>
                        <th>اسم المنتج</th>
                        <th>القسم</th>
                        <th>الثمن</th>
                        <th>الطلب</th>
                    </tr>
                </thead>
                <tbody>
                    
                    <!-- المنتج 1 -->
                    <tr>
                        <td><img src="https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=150&auto=format&fit=crop" alt="حقيبة" class="product-img"></td>
                        <td>حقيبة ظهر جلدية احترافية</td>
                        <td>حقائب</td>
                        <td class="price">290 درهم</td>
                        <td><a href="https://wa.me/212600000000?text=بغيت%20نطلب%20حقيبة%20الظهر" target="_blank" class="order-btn">طلب الآن</a></td>
                    </tr>
                    
                    <!-- المنتج 2 -->
                    <tr>
                        <td><img src="https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=150&auto=format&fit=crop" alt="حقيبة" class="product-img"></td>
                        <td>حقيبة يد أنيقة</td>
                        <td>حقائب</td>
                        <td class="price">400 درهم</td>
                        <td><a href="https://wa.me/212600000000?text=بغيت%20نطلب%20حقيبة%20اليد" target="_blank" class="order-btn">طلب الآن</a></td>
                    </tr>

                </tbody>
            </table>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Med.shop. جميع الحقوق محفوظة.</p>
    </footer>

</body>
</html>
