<style>
  body {
      background-color: #ffffff !important;
      color: #111111 !important;
  }
  .btn.secondary {
      background-color: #0056b3 !important;
      color: #ffffff !important;
      padding: 12px 24px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
  }
  .btn.secondary:hover {
      background-color: #004085 !important;
  }
</style>
<div class="form-row">
  <input type="text" id="firstName" placeholder="الإسم" required />
  <input type="text" id="lastName" placeholder="الكنية" required />
</div>

<div class="form-row">
  
  <input type="tel" id="phone" placeholder="رقم الهاتف (مع رمز البلد، مثال +2126...)" required />
  <input type="email" id="email" placeholder="البريد الإلكتروني (اختياري)" />
</div>

<div class="form-row">
  <textarea id="notes" rows="3" placeholder="ملاحظات إضافية"></textarea>
</div>

<div class="summary" id="orderSummary">لم تختَر منتجاً بعد.</div>

<div class="send-group">
  <button type="button" id="sendMail" class="btn">إرسال عبر البريد الإلكتروني</button>
  <button type="button" id="sendWhats" class="btn secondary">إرسال عبر WhatsApp</button>
  <button type="reset" class="btn" style="background:#e0e0e0;color:#000">إعادة تعيين</button>
</div>
<div style="margin-top:8px"><small>ملاحظة: زر البريد يفتح برنامج البريد الافتراضي (mailto). زر WhatsApp يفتح محادثة WhatsApp Web/تطبيق.</small></div>


<script>
// دالة لتحديث ملخص الطلب في الفورم
function updateOrderSummaryInForm() {
    const summaryDiv = document.getElementById('orderSummary');
    if (typeof cart === 'undefined' || cart.length === 0) {
        summaryDiv.innerHTML = "لم تختَر منتجاً بعد.";
        return;
    }
    
    let total = 0;
    let itemsText = "<strong>المنتجات المختارة:</strong><br>";
    
    cart.forEach((item, index) => {
        itemsText += `- ${item.name} (${item.price}$)<br>`;
        total += item.price;
    });
    
    itemsText += `<br><strong>المجموع الإجمالي: ${total}$</strong>`;
    summaryDiv.innerHTML = itemsText;
}

// تعديل الدالة القديمة باش تحدث الملخص فاش يتزاد شي برودوي
if (typeof addToCart !== 'undefined') {
    const originalAddToCart = addToCart;
    addToCart = function(productId) {
        originalAddToCart(productId);
        updateOrderSummaryInForm();
    };
}

// تفعيل تحديث الملخص عند تحميل الصفحة
document.addEventListener('DOMContentLoaded', () => {
    setTimeout(updateOrderSummaryInForm, 500);
});

// دالة لتجميع نص الرسالة
function generateOrderMessage() {
    const firstName = document.getElementById('firstName').value.trim();
    const lastName = document.getElementById('lastName').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const email = document.getElementById('email').value.trim() || "غير محدد";
    const notes = document.getElementById('notes').value.trim() || "لا توجد";

    if (!firstName || !lastName || !phone) {
        alert("المرجو ملء الخانات الإجبارية: الإسم، الكنية، ورقم الهاتف.");
        return null;
    }

    if (typeof cart === 'undefined' || cart.length === 0) {
        alert("سلتك فارغة! المرجو إضافة منتجات أولاً.");
        return null;
    }

    let total = 0;
    let productsList = "";
    cart.forEach(item => {
        productsList += `- ${item.name} (${item.price}$)\n`;
        total += item.price;
    });

    let message = `*طلب جديد من الموقع* 🛒\n\n`;
    message += `👤 *الزبون:* ${firstName} ${lastName}\n`;
    message += `📞 *الهاتف:* ${phone}\n`;
    message += `📧 *الإيميل:* ${email}\n`;
    message += `📝 *ملاحظات:* ${notes}\n\n`;
    message += `📦 *المنتجات:*\n${productsList}\n`;
    message += `💰 *المجموع الإجمالي:* ${total}$`;

    return { message, total };
}

// --- إرسال عبر WhatsApp ---
document.getElementById('sendWhats').addEventListener('click', () => {
    const order = generateOrderMessage();
    if (!order) return;

    // ⚠️ بدّل هاد النمرة بنمرتك الشخصية (خاص تبدا بـ 212 بلا + وبلا أصفار)
    const myWhatsAppNumber = "212600000000"; 
    
    const encodedMessage = encodeURIComponent(order.message);
    const whatsappUrl = `https://wa.me/${myWhatsAppNumber}?text=${encodedMessage}`;
    
    window.open(whatsappUrl, '_blank');
});

// --- إرسال عبر البريد الإلكتروني ---
document.getElementById('sendMail').addEventListener('click', () => {
    const order = generateOrderMessage();
    if (!order) return;

    // ⚠️ بدّل هاد الإيميل بإيميلك الشخصي
    const myEmail = "your-email@example.com"; 
    
    const subject = encodeURIComponent("طلب شراء جديد من الموقع");
    const body = encodeURIComponent(order.message);
    
    const mailtoUrl = `mailto:${myEmail}?subject=${subject}&body=${body}`;
    
    window.location.href = mailtoUrl;
});
</script>
