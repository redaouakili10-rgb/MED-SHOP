<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر المنتجات الفاخرة</title>
    <style>
        :root { --primary-color: #111; --accent-color: #c9a054; --bg-color: #fcfcfc; }
        body { font-family: sans-serif; background: var(--bg-color); margin: 0; }
        .nav { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: white; border-bottom: 2px solid #eee; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: auto; }
        .card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 250px; object-fit: cover; }
        .info { padding: 15px; }
        .btn { display: block; width: 100%; padding: 12px; background: var(--primary-color); color: white; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .btn:hover { background: var(--accent-color); }
    </style>
</head>
<body>

<div class="nav">
    <h2 id="title">المجموعة الحصرية</h2>
    <button onclick="toggleLang()" class="btn" style="width: auto;">Français / العربية</button>
</div>

<div class="grid" id="grid"></div>

<script>
    const products = [
        {ar: "حذاء نايكي", fr: "Nike Sneakers", img: "https://images.unsplash.com/photo-1542291026-7eec264c27ff"},
        {ar: "حقيبة لويس فيتون", fr: "LV Bag", img: "https://images.unsplash.com/photo-1584917865442-de89df76afd3"},
        {ar: "حقيبة هيرميس", fr: "Hermes Bag", img: "https://images.unsplash.com/photo-1594223274512-ad4883739eb1"},
        {ar: "حقيبة جلدية", fr: "Leather Bag", img: "https://images.unsplash.com/photo-1548036328-c9fa89d128fa"},
        {ar: "حقيبة سبيدي", fr: "Speedy Bag", img: "https://images.unsplash.com/photo-1622560480605-837503d21262"},
        {ar: "حقيبة شانيل", fr: "Chanel Bag", img: "https://images.unsplash.com/photo-1590874103328-e638a68340d0"},
        {ar: "ساعة كارتييه", fr: "Cartier Watch", img: "https://images.unsplash.com/photo-1522312346375-d1a52e2b92ad"},
        {ar: "حقيبة ألدو", fr: "Aldo Bag", img: "https://images.unsplash.com/photo-1605733568705-3bd47130092c"},
        {ar: "حقيبة كتف", fr: "Tote Bag", img: "https://images.unsplash.com/photo-1614165970366-0d046f41e57c"},
        {ar: "حقيبة غوتشي", fr: "Gucci Bag", img: "https://images.unsplash.com/photo-1606760227091-3dd870d97f1d"}
    ];

    let lang = 'ar';
    function render() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        products.forEach(p => {
            grid.innerHTML += `<div class="card">
                <img src="${p.img}" alt="${p[lang]}">
                <div class="info">
                    <h3>${p[lang]}</h3>
                    <p>140 DH</p>
                    <button class="btn" onclick="send('${p[lang]}')">${lang === 'ar' ? 'اشتري الآن' : 'Commander'}</button>
                </div>
            </div>`;
        });
    }

    function toggleLang() {
        lang = (lang === 'ar') ? 'fr' : 'ar';
        document.getElementById('title').innerText = (lang === 'ar') ? 'المجموعة الحصرية' : 'Collection Exclusive';
        document.documentElement.dir = (lang === 'ar') ? 'rtl' : 'ltr';
        render();
    }

    function send(name) {
        // الرقم ديال الواتساب ديالك 0608256020
        window.open(`https://wa.me/212608256020?text=السلام عليكم، أريد طلب منتج: ${name}`, '_blank');
    }

    render();
</script>

</body>
</html>
