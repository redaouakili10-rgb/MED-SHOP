<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Med.shop | المتجر الاحترافي</title>
    <style>
        /* الألوان المستوحاة من اللوغو الذهبي والأسود */
        :root {
            --primary: #d4af37; /* لون ذهبي احترافي */
            --primary-hover: #aa8c2c;
            --bg-main: #0a0a0a;
            --bg-card: #141414;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --border-color: #222222;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            line-height: 1.6;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 0;
        }

        /* الهيدر مع اللوغو الجديد */
        header {
            border-bottom: 1px solid var(--border-color);
            padding: 15px 0;
            background-color: rgba(10, 10, 10, 0.9);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* ستايل اللوغو كصورة بروفايل علوية */
        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
        }

        .brand-logo {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 50%; /* باش تجي دايرة بحال البروفايل */
            border: 2px solid var(--primary);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }

        .brand-name {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--primary);
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
        }

        /* واجهة الموقع */
        .hero {
            text-align: center;
            padding: 80px 0;
            background: radial-gradient(circle at center, rgba(212, 175, 55, 0.1) 0%, transparent 70%);
        }

        .hero h2 {
            font-size: 3rem;
            margin-bottom: 20px;
            color: #fff;
        }

        .hero p {
            color: var(--text-muted);
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto 30px auto;
        }

        /* قسم جدول المنتجات */
        .products-section {
            padding: 40px 0;
        }

        .section-title {
            font-size: 2rem;
            margin-bottom: 25px;
            color: var(--primary);
            border-right: 4px solid var(--primary);
            padding-right: 15px;
        }

        .table-container {
            overflow-x: auto;
            background-color: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: right;
        }

        th, td {
            padding: 18px;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background-color: rgba(212, 175, 55, 0.05);
            color: var(--primary);
            font-weight: 600;
            font-size: 1.1rem;
        }

        tr:hover {
            background-color: rgba(255, 255, 255, 0.02);
        }

        .product-img {
            width: 65px;
            height: 65px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #333;
        }

        .price {
            color: var(--primary);
            font-weight: bold;
            font-size: 1.1rem;
        }

        .status-badge {
            background-color: #2ecc71;
            color: #fff;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        footer {
            text-align: center;
            padding: 40px 0;
            margin-top: 60px;
            border-top: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .hero h2 { font-size: 2rem; }
            th, td { padding: 12px; }
            .product-img { width: 50px; height: 50px; }
            .brand-logo { width: 50px; height: 50px; }
            .brand-name { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <!-- الهيدر فيه اللوغو ديالك كبرفيل -->
    <header>
        <div class="container nav-container">
            <a href="#" class="logo-container">
                <img src="image.png" alt="Med.shop Logo" class="brand-logo">
                <span class="brand-name">Med.shop</span>
            </a>
        </div>
    </header>

    <!-- واجهة الموقع الترحيبية -->
    <section class="hero">
        <div class="container">
            <h2>مرحباً بك في Med.shop</h2>
            <p>منصتك الاحترافية لعرض المنتجات وإدارتها بكل سهولة وجودة عالية.</p>
        </div>
    </section>

    <!-- قسم الجدول الشامل للمنتجات -->
    <section class="products-section">
        <div class="container">
            <h3 class="section-title">قائمة المنتجات الحالية</h3>
            
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>صورة المنتج</th>
                            <th>اسم المنتج</th>
                            <th>القسم</th>
                            <th>الثمن</th>
                            <th>الحالة</th>
                        </tr>
                    </thead>
                    <tbody id="product-table-body">
                        
                        <!-- المنتج 1 -->
                        <tr>
                            <td><img src="https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=150&auto=format&fit=crop" alt="حقيبة ظهر" class="product-img"></td>
                            <td>حقيبة ظهر كلاسيكية</td>
                            <td>حقائب</td>
                            <td class="price">290 درهم</td>
                            <td><span class="status-badge">متوفر</span></td>
                        </tr>
                        
                        <!-- المنتج 2 -->
                        <tr>
                            <td><img src="https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=150&auto=format&fit=crop" alt="حقيبة يد" class="product-img"></td>
                            <td>حقيبة يد أنيقة</td>
                            <td>حقائب</td>
                            <td class="price">400 درهم</td>
                            <td><span class="status-badge">متوفر</span></td>
                        </tr>

                        <!-- 💡 وقتما بغيتي تزيد منتج جديد، حط الكود ديالو تحت هاد السطر نيشان -->

                    </tbody>
                </table>
            </div>
        </div>
    </section>

    <!-- الفوتر -->
    <footer>
        <div class="container">
            <p>&copy; 2026 Med.shop. جميع الحقوق محفوظة.</p>
        </div>
    </footer>

</body>
</html>
