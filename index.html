<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Med.shop | إدارة المنتجات</title>
    <style>
        :root {
            --primary-color: #d4af37; /* اللون الذهبي ديال اللوغو ديالك */
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --btn-color: #2ecc71; /* لون زر الطلب الأخضر */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* الهيدر المحترف فيه اللوغو ديالك */
        header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 20px 0;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--primary-color);
        }

        .brand-logo {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid var(--primary-color);
        }

        header h1 {
            color: var(--primary-color);
            margin: 0;
            font-size: 2.5rem;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }

        /* ستايل الجدول الأصلي النقي */
        .table-container {
            overflow-x: auto;
            background-color: var(--card-bg);
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: right;
        }

        th, td {
            padding: 15px;
            border-bottom: 1px solid #333;
            vertical-align: middle;
        }

        th {
            background-color: rgba(212, 175, 55, 0.1);
            color: var(--primary-color);
            font-weight: bold;
        }

        tr:hover {
            background-color: rgba(255, 255, 255, 0.02);
        }

        .product-img {
            width: 65px;
            height: 65px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid #444;
        }

        .price {
            color: var(--primary-color);
            font-weight: bold;
        }

        /* ستايل زر طلب الآن */
        .order-btn {
            display: inline-block;
            background-color: var(--btn-color);
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.9rem;
            transition: background 0.2s;
            text-align: center;
        }

        .order-btn:hover {
            background-color: #27ae60;
        }

        footer {
            text-align: center;
            padding: 30px 0;
            margin-top: 40px;
            color: #666;
            font-size: 0.9rem;
            border-top: 1px solid #222;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <img src="image.png" alt="Med.shop" class="brand-logo">
            <h1>Med.shop</h1>
        </header>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>صورة المنتج</th>
                        <th>اسم المنتج</th>
                        <th>القسم</th>
                        <th>الثمن</th>
                        <th>الطلب</th>
                    </tr>
                </thead>
                <tbody id="product-table-body">
                    
                    <tr>
                        <td><img src="https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=150&auto=format&fit=crop" alt="حقيبة" class="product-img"></td>
                        <td>حقيبة ظهر جلدية احترافية</td>
                        <td>حقائب صناعة يدوية</td>
                        <td class="price">290 درهم</td>
                        <td><a href="https://wa.me/212600000000?text=بغيت%20نطلب%20حقيبة%20الظهر" target="_blank" class="order-btn">طلب الآن</a></td>
                    </tr>

                    </tbody>
            </table>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Med.shop. جميع الحقوق محفوظة.</p>
    </footer>

</body>
</html>
